name: RDP ULTIMATE (IP ثابت بعد أول تشغيل)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: تفعيل RDP
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

      - name: إنشاء مستخدم RDP
        run: |
          $password = "P@ss" + (Get-Random -Maximum 99999) + "!"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "Admin" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Admin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Admin"
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      # =============================================================
      # استرجاع الكاش (إذا كان موجوداً) أو إنشاء مجلد جديد
      # =============================================================
      - name: استرجاع حالة Tailscale من الكاش
        uses: actions/cache@v4
        id: cache-ts
        with:
          path: C:\ts-state
          key: tailscale-state-${{ runner.os }}
          restore-keys: |
            tailscale-state-${{ runner.os }}

      - name: تثبيت Tailscale
        run: |
          curl -L -o tailscale.msi https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi
          Start-Process msiexec.exe -ArgumentList "/i `"$PWD\tailscale.msi`" /quiet /norestart" -Wait
          Start-Sleep -Seconds 5
          Remove-Item tailscale.msi -Force -ErrorAction SilentlyContinue
          $tsPath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsPath)) { exit 1 }
          Write-Host "✅ تم تثبيت Tailscale"

      - name: الاتصال بـ Tailscale (مع مسح الكاش التالف)
        run: |
          $tsPath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $stateDir = "C:\ts-state"

          # إنشاء المجلد
          New-Item -ItemType Directory -Force -Path $stateDir | Out-Null

          # محاولة الاتصال
          Write-Host "محاولة الاتصال بـ Tailscale..."
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp --statedir=$stateDir --accept-risk=all

          # انتظار
          Start-Sleep -Seconds 10

          # فحص الحالة
          $status = & $tsPath status
          if ($status -match "Logged out" -or $status -match "NeedsLogin") {
            Write-Host "⚠️  فشل المصادقة، سنحذف الكاش التالف ونعيد المحاولة..."
            
            # حذف المجلد القديم
            Remove-Item -Path $stateDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $stateDir | Out-Null

            # إعادة المحاولة مع إجبار إعادة المصادقة
            & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp --statedir=$stateDir --accept-risk=all --force-reauth
            Start-Sleep -Seconds 10
          }

          # الحصول على IP مع إعادة المحاولة
          $maxAttempts = 10
          $ip = $null
          for ($i=1; $i -le $maxAttempts; $i++) {
            $ip = & $tsPath ip -4
            if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
              Write-Host "✅ تم الحصول على IP: $ip"
              echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
              break
            }
            Write-Host "⏳ انتظار IP... المحاولة $i من $maxAttempts"
            Start-Sleep -Seconds 5
          }

          if (-not $ip) {
            Write-Error "❌ فشل الحصول على IP"
            exit 1
          }

      - name: عرض بيانات الدخول
        run: |
          Write-Host "====================================================="
          Write-Host "✅ RDP شغال الآن"
          Write-Host "العنوان: $env:TAILSCALE_IP"
          Write-Host "المستخدم: Admin"
          Write-Host "كلمة المرور: $env:RDP_PASSWORD"
          Write-Host "====================================================="
          Write-Host "⚠️  الـ IP سيصبح ثابتاً بعد أول تشغيل ناجح"
          Write-Host "====================================================="
          while ($true) {
            Write-Host "[$(Get-Date)] RDP نشط على $env:TAILSCALE_IP"
            Start-Sleep -Seconds 300
          }
